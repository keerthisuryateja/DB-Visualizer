name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build Windows installer
      run: npm run build:installer -- --publish never

    - name: Locate installer
      id: installer
      run: |
        $file = Get-ChildItem -Path release -Filter *.exe -File -Recurse |
          Sort-Object LastWriteTime -Descending |
          Select-Object -First 1

        if (-not $file) {
          throw "No installer (.exe) found under release/."
        }

        "installer_path=$($file.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "installer_name=$($file.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      shell: pwsh

    - name: Create GitHub release and upload assets
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        body: |
          Automated desktop release for ${{ github.ref_name }}.

          ### Release Assets
          - 📦 Windows Installer (NSIS)
          See CHANGELOG.md for details.
        files: |
          ${{ steps.installer.outputs.installer_path }}
          CHANGELOG.md
        fail_on_unmatched_files: true

    - name: Release summary
      run: |
        echo "✅ Release created successfully!"
        echo "📦 Asset: ${{ steps.installer.outputs.installer_name }}"
        echo "🔖 Tag: ${{ github.ref_name }}"
      shell: pwsh
