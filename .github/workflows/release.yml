name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests and build
      run: npm run build

  build-release:
    needs: test
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build web bundle
      run: npm run build

    - name: Build Windows installer
      run: npm run build:installer

    - name: Get version from package.json
      id: version
      run: |
        $version = (Get-Content package.json | ConvertFrom-Json).version
        echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      shell: pwsh

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        body: |
          **DB Visualizer v${{ steps.version.outputs.VERSION }}**

          ### Release Assets
          - 📦 Windows Installer (NSIS)
          - 🌐 Web Bundle

          ### Installation
          Download the installer and run to install DB Visualizer on Windows.

          ### Development
          - Report issues: [GitHub Issues](https://github.com/keerthisuryateja/DB-Visualizer/issues)
          - Contribute: [CONTRIBUTING.md](https://github.com/keerthisuryateja/DB-Visualizer/blob/main/CONTRIBUTING.md)

          See [CHANGELOG.md](https://github.com/keerthisuryateja/DB-Visualizer/blob/main/CHANGELOG.md) for detailed changes.

    - name: Upload Windows Installer
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./release/DB Visualizer Setup ${{ steps.version.outputs.VERSION }}.exe
        asset_name: DB-Visualizer-Setup-${{ steps.version.outputs.VERSION }}.exe
        asset_content_type: application/octet-stream
      continue-on-error: true

    - name: Upload Release Notes
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./CHANGELOG.md
        asset_name: CHANGELOG.md
        asset_content_type: text/markdown
      continue-on-error: true

    - name: Notify Release
      run: |
        echo "✅ Release created successfully!"
        echo "📦 Version: ${{ steps.version.outputs.VERSION }}"
        echo "🔗 Release URL: ${{ steps.create_release.outputs.html_url }}"
      shell: pwsh
